// pkg/proto/trackers/trackers.proto
syntax = "proto3";

package trackers;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/TMS360/backend-pkg/proto/trackers";

// TrackersService provides vehicle tracking functionality
service TrackersService {
  // StreamVehicleVINs sends a stream of VINs from backend-load to samsara-tracker
  rpc StreamVehicleVINs(StreamVehicleVINsRequest) returns (stream VehicleVIN);

  // GetActiveTripStops returns pending trip stops for a truck (admin/debug only)
  rpc GetActiveTripStops(GetActiveTripStopsRequest) returns (GetActiveTripStopsResponse);

  // GetTripStops returns all stops for a given trip (used by asset-tracking
  // to build the initial route after consuming a trips/created Kafka event).
  rpc GetTripStops(GetTripStopsRequest) returns (GetTripStopsResponse);

  // ApplyRouteETAs writes planned_arrival in batch for a list of stops, called
  // by asset-tracking after the initial route build (replaces UpdateStopETA).
  rpc ApplyRouteETAs(ApplyRouteETAsRequest) returns (ApplyRouteETAsResponse);
}

// Request to stream vehicle VINs
message StreamVehicleVINsRequest {
  // Optional: include only active vehicles
  bool active_only = 1;
  // Optional: last sync timestamp to get only updates
  google.protobuf.Timestamp last_sync = 2;
}

// Vehicle VIN information
message VehicleVIN {
  string id = 1;           // UUID of truck or trailer
  string vin = 2;          // Vehicle Identification Number
  VehicleType type = 3;    // Type of vehicle
  string number = 4;       // Vehicle number
  google.protobuf.Timestamp updated_at = 5;
  string company_id = 6;   // Company ID for grouping vehicles
}

// Type of vehicle
enum VehicleType {
  VEHICLE_TYPE_UNSPECIFIED = 0;
  VEHICLE_TYPE_TRUCK = 1;
  VEHICLE_TYPE_TRAILER = 2;
}

// Location update message for Kafka
message VehicleLocationUpdate {
  string id = 1;                          // UUID of truck or trailer
  string vin = 2;                         // Vehicle Identification Number
  VehicleType type = 3;                   // Type of vehicle
  double latitude = 4;                    // Latitude coordinate
  double longitude = 5;                   // Longitude coordinate
  double heading = 6;                     // Heading in degrees
  double speed = 7;                       // Speed in mph
  string address = 8;                     // Address name
  string formatted_location = 9;          // Formatted location string
  google.protobuf.Timestamp gps_time = 10; // GPS timestamp
  string samsara_vehicle_id = 11;         // Samsara's vehicle ID
  string vehicle_name = 12;               // Vehicle name from Samsara
}

// Batch of location updates for Kafka
message VehicleLocationUpdateBatch {
  repeated VehicleLocationUpdate updates = 1;
  google.protobuf.Timestamp batch_time = 2;
}

// VehiclePositionService provides vehicle position history (served by samsara-tracker)
service VehiclePositionService {
  // GetVehicleRoute returns GPS route points for a truck within a time range
  rpc GetVehicleRoute(GetVehicleRouteRequest) returns (GetVehicleRouteResponse);

  // SaveEstimatedRoute stores estimated route polylines from HERE Maps
  rpc SaveEstimatedRoute(SaveEstimatedRouteRequest) returns (SaveEstimatedRouteResponse);

  // GetEstimatedRoute retrieves estimated route polylines for a trip
  rpc GetEstimatedRoute(GetEstimatedRouteRequest) returns (GetEstimatedRouteResponse);
}

message GetVehicleRouteRequest {
  string truck_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message RoutePoint {
  double latitude = 1;
  double longitude = 2;
  double heading = 3;
  double speed = 4;
  google.protobuf.Timestamp gps_time = 5;
  string address = 6;
  double heading_degrees = 7;
}

message GetVehicleRouteResponse {
  repeated RoutePoint points = 1;
}

// Estimated route messages

message EstimatedRouteLeg {
  // leg_index 0 is reserved for the origin segment (truck → first pending stop),
  // 1..N for stop-to-stop segments. Origin is the only leg that may be replaced
  // (truck change); 1..N are append-only.
  int32 leg_index = 1;
  string polyline = 2;           // HERE Flexible Polyline encoded string
  int32 distance_meters = 3;
  int32 duration_seconds = 4;
  string stop_id = 5;            // UUID of the destination trip stop
  string coordinates = 7;        // Decoded polyline as JSON: [[lat,lng],...]
  reserved 6;                    // formerly route_type — single source: append-once static.
  reserved "route_type";
}

message SaveEstimatedRouteRequest {
  string trip_id = 1;
  string company_id = 2;
  repeated EstimatedRouteLeg legs = 3;
  int32 total_distance_meters = 4;
  int32 total_duration_seconds = 5;
  string truck_id = 6;
}

message SaveEstimatedRouteResponse {
  bool success = 1;
}

message GetEstimatedRouteRequest {
  string trip_id = 1;
}

message GetEstimatedRouteResponse {
  string trip_id = 1;
  repeated EstimatedRouteLeg legs = 2;
  int32 total_distance_meters = 3;
  int32 total_duration_seconds = 4;
}

// Active trip stops for route calculation

message GetActiveTripStopsRequest {
  string truck_id = 1;
}

message TripStopInfo {
  string stop_id = 1;
  string trip_id = 2;
  string company_id = 3;
  string stop_type = 4;       // ORIGIN, PICKUP, DROPOFF, DROPOFF_PICKUP, CARGO_TRANSFER
  int32 stop_sequence = 5;
  double latitude = 6;
  double longitude = 7;
  string status = 8;          // PENDING, ARRIVED, COMPLETED
  bool is_complete = 9;
}

message GetActiveTripStopsResponse {
  string trip_id = 1;
  string truck_id = 2;
  string company_id = 3;
  repeated TripStopInfo stops = 4;
}

// Trip stops snapshot (used by asset-tracking after consuming trips/created)

message GetTripStopsRequest {
  string trip_id = 1;
}

message GetTripStopsResponse {
  string trip_id = 1;
  string company_id = 2;
  string shipment_id = 3;
  string created_by = 4;        // creator of the parent shipment, used for route_built notification
  string truck_id = 5;          // optional, may be empty when truck not yet assigned
  repeated TripStopInfo stops = 6;
}

// Batched ETA application (replaces per-stop UpdateStopETA)

message StopETA {
  string stop_id = 1;
  google.protobuf.Timestamp planned_arrival = 2;
}

message ApplyRouteETAsRequest {
  string trip_id = 1;
  repeated StopETA etas = 2;
}

message ApplyRouteETAsResponse {
  bool success = 1;
}
