// pkg/proto/couriers/couriers.proto
syntax = "proto3";

package couriers;

import "google/protobuf/empty.proto";
import "filters/filters.proto";

option go_package = "github.com/TMS360/backend-pkg/proto/couriers";

service CouriersService {
  rpc UpdateCache(google.protobuf.Empty) returns (UpdateCacheResponse);

  rpc GetUsersByIds(GetUsersByIdsRequest) returns (GetUsersByIdsResponse);

  // Cross-service filtering: returns user IDs matching the filter
  rpc ResolveIDs(UserFilter) returns (filters.IDsResponse);

  // Returns user_ids of all users in company with role ∉ {driver, super_admin}.
  rpc ListOfficeUsers(ListOfficeUsersRequest) returns (ListOfficeUsersResponse);

  // Returns user_ids of ALL drivers (role = driver) in the company — no status
  // filter (active + inactive). Used by backend-accounting's pay-batch
  // "Add driver" picker (availableDriversForBatch).
  rpc ListDrivers(ListDriversRequest) returns (ListDriversResponse);

  // ListUserFiles returns user_files attached to a (entity_type, entity_id) pair
  // within the requesting actor's tenant. Used by the driver-app aggregator in
  // tms-loads to surface a driver's personal documents (license, medical card, etc.).
  rpc ListUserFiles(ListUserFilesRequest) returns (ListUserFilesResponse);

  // GetUsersByPermission resolves the user_ids in a tenant that should receive
  // alerts gated by a permission code, with a fallback chain (named holders →
  // tenant admins). Used by DEV-1018 (tms-files compliance reminder cron) to
  // route document-expiry reminders to the right recipients.
  rpc GetUsersByPermission(GetUsersByPermissionRequest) returns (GetUsersByPermissionResponse);
}

// ResolutionSource reports which fallback tier produced the recipient list.
// Values are fully prefixed per this repo's enum convention (and to avoid the
// generic NONE/etc. colliding in the package-level enum-value namespace).
enum ResolutionSource {
  RESOLUTION_SOURCE_UNSPECIFIED  = 0;
  RESOLUTION_SOURCE_NAMED_USERS  = 1; // users effectively holding the permission code
  RESOLUTION_SOURCE_ROLE_DEFAULT = 2; // reserved: tms-auth has no notification-default-role concept yet
  RESOLUTION_SOURCE_TENANT_ADMIN = 3; // fallback to the tenant's admin role
  RESOLUTION_SOURCE_NONE         = 4; // nothing resolved (anomaly — caller logs/alerts)
}

message GetUsersByPermissionRequest {
  string company_id      = 1; // tenant UUID (required)
  string permission_code = 2; // e.g. "compliance.receive-alerts" (required)
  // document_type_id is RESERVED for future per-doc-type permission granularity.
  // tms-auth RBAC is tenant-wide (not doc-type scoped), so it is currently ignored.
  optional string document_type_id = 3;
}

message GetUsersByPermissionResponse {
  repeated string user_ids = 1; // resolved recipients (UUID strings)
  ResolutionSource source  = 2; // which tier produced user_ids
}

message UserFilter {
  filters.StringFilter name = 1;
  filters.StringFilter email = 2;
  filters.StringFilter phone = 3;
  filters.StringFilter role = 4;
  optional string search = 5; // full-text search across name, email
}

message UpdateCacheResponse {
  bool success = 1;
}

message GetUsersByIdsRequest {
  repeated string user_ids = 1;
}

message GetUsersByIdsResponse {
  repeated UserInfo users = 1;
}

message UserInfo {
  string id = 1;
  string name = 2;
  string email = 3;
  int32 driver_ownership = 4;   // 0 = unset; 1..6 = enums.DriverOwnership
  string phone = 5;             // primary phone (User.phone); "" = unset
}

message ListOfficeUsersRequest {
  string company_id = 1;
}

message ListOfficeUsersResponse {
  repeated string user_ids = 1;
}

message ListDriversRequest {
  string company_id = 1;
}

message ListDriversResponse {
  repeated string user_ids = 1;
}

message ListUserFilesRequest {
  // entity_type ∈ {"DRIVER", "DISPATCHER"}
  string entity_type = 1;
  string entity_id = 2;
}

message UserFile {
  string id = 1;
  string entity_type = 2;
  string entity_id = 3;
  string file_id = 4;
  string document_type = 5;
  string document_type_id = 6;
  string company_id = 7;
  string uploaded_by = 8;
  string notes = 9;
  // RFC3339 timestamps
  string created_at = 10;
  string updated_at = 11;
}

message ListUserFilesResponse {
  repeated UserFile files = 1;
}