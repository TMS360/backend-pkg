syntax = "proto3";

package files;

option go_package = "github.com/TMS360/backend-pkg/proto/files";

service FilesService {
  rpc GetFile (GetFileRequest) returns (GetFileResponse);
  rpc GetFiles (GetFilesRequest) returns (GetFilesResponse);
  rpc Download (DownloadRequest) returns (stream DownloadResponse);

  // ListCompanyFiles returns files in the actor's tenant filtered by document
  // category. Tenant scoping is enforced server-side via TenantScopePlugin
  // using the JWT actor in context, so callers cannot probe other tenants.
  // Empty categories returns no rows (force callers to be explicit).
  rpc ListCompanyFiles (ListCompanyFilesRequest) returns (ListCompanyFilesResponse);

  // UploadFile is a universal client-streaming upload. The first message MUST
  // carry UploadFileMeta (filename, optional content_type, and either
  // purpose or document_type_id to pick a FileRule). Subsequent messages
  // carry raw chunks. Server enforces tenant scoping via JWT actor in metadata,
  // computes SHA256 for dedup, and streams to S3 honoring the chosen FileRule.
  // Dedup hits return the existing File with was_duplicate=true (not an error).
  rpc UploadFile (stream UploadFileRequest) returns (UploadFileResponse);

  // DeleteFile removes the File metadata row and the underlying S3 object.
  // Idempotent: deleting a missing id returns ok=false but no error so callers
  // can call it best-effort during cache invalidation / re-export cleanup.
  // Tenant scoping is enforced server-side via TenantScopePlugin.
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);
}

message GetFileRequest {
  string id = 1;
}

message GetFilesRequest {
  repeated string ids = 1;
}

message File {
  string id = 1;
  string url = 2;
  string s3_key = 3;
  string bucket = 4;
  string filename = 5;
  string mime_type = 6;
  int64 size_bytes = 7;
  // Document type name from tms-files (e.g. "POD", "BOL", "RC", "INVOICE"). Empty if not classified.
  string document_type = 8;
  // Document type UUID. Empty if not classified.
  string document_type_id = 9;
  // Document category (e.g. "SHIPMENT", "DRIVER"). Empty if not classified.
  string category = 10;
}

message GetFileResponse {
  File file = 1;
}

message GetFilesResponse {
  map<string, File> files = 1;
}

message ListCompanyFilesRequest {
  // Document categories to include, e.g. ["GENERAL", "COMPANY"].
  // Tenant is implicit (actor.company_id) — not part of the request.
  repeated string categories = 1;
}

message ListCompanyFilesResponse {
  repeated File files = 1;
}

message DownloadRequest {
  string file_id = 1;
}

message DownloadResponse {
  // Oneof allows us to send metadata in the first chunk and data in others
  // Or we can just include metadata in every message (slightly more overhead)
  bytes chunk = 1;
  string file_name = 2;
  string content_type = 3;
}

message UploadFileRequest {
  oneof payload {
    UploadFileMeta meta = 1;
    bytes chunk = 2;
  }
}

message UploadFileMeta {
  string filename = 1;
  // Optional. If empty, server sniffs mime from content.
  string content_type = 2;
  // Optional. SystemPurpose name, e.g. "PAY_STATEMENT" or "USER_AVATAR".
  // Either purpose or document_type_id must be set so server can pick a FileRule.
  string purpose = 3;
  // Optional. Document type UUID; alternative to purpose for picking a FileRule
  // via document category mapping.
  string document_type_id = 4;
}

message UploadFileResponse {
  File file = 1;
  // True when content (by SHA256) was already stored; server returned the
  // existing record instead of creating a new one. Idempotent re-upload signal.
  bool was_duplicate = 2;
}

message DeleteFileRequest {
  // File UUID. Tenant scoping is enforced server-side, so callers cannot
  // delete files outside their company.
  string id = 1;
}

message DeleteFileResponse {
  // True when the file was found and removed; false when the id did not exist
  // (idempotent, no error). Callers can ignore unless they need exact audit.
  bool deleted = 1;
}