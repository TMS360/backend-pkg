syntax = "proto3";

package notifications;

option go_package = "github.com/TMS360/backend-pkg/proto/notifications";

service NotificationsService {
  rpc RequestDriverLocation(RequestDriverLocationReq) returns (RequestDriverLocationRes);
}

message RequestDriverLocationReq {
  string user_id = 1;
}

message RequestDriverLocationRes {
  bool sent = 1;
}
