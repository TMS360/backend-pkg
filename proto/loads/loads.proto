// pkg/proto/loads/loads.proto
syntax = "proto3";

package loads;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "filters/filters.proto";

option go_package = "github.com/TMS360/backend-pkg/proto/loads";

// LoadsService provides load management functionality
service LoadsService {
  // Get driver performance metrics
  rpc GetDriverTripDetails (GetDriverTripDetailsRequest) returns (GetDriverTripDetailsResponse);

  // DriverHasActiveTrip
  rpc DriverHasActiveTrip (DriverHasActiveTripRequest) returns (DriverHasActiveTripResponse);

  // DEV-896: absence-side advisory check. Returns slim summaries of
  // active-dispatch trips assigned to the driver (as main OR secondary
  // driver) whose pickup→delivery calendar window overlaps
  // [start_date, end_date] inclusive. Read-only; callers surface warnings
  // and must never block the absence write on this.
  rpc GetTripsOverlappingWindow (GetTripsOverlappingWindowRequest) returns (GetTripsOverlappingWindowResponse);

  rpc GetRecentBrokerIDs(GetRecentBrokerIDsRequest) returns (GetRecentBrokerIDsResponse);

  // Get shipment by ID
  rpc GetShipment(GetShipmentRequest) returns (ShipmentResponse);

  // List shipments with filters
  rpc ListShipments(ListShipmentsRequest) returns (ListShipmentsResponse);

  // Get trip by ID
  rpc GetTrip(GetTripRequest) returns (TripResponse);

  // List trips with filters
  rpc ListTrips(ListTripsRequest) returns (ListTripsResponse);

  // Get vehicle assignments for a time range
  rpc GetVehicleAssignments(GetVehicleAssignmentsRequest) returns (GetVehicleAssignmentsResponse);

  // Update vehicle location
  rpc UpdateVehicleLocation(UpdateVehicleLocationRequest) returns (google.protobuf.Empty);

  // Stream vehicle locations
  rpc StreamVehicleLocations(StreamVehicleLocationsRequest) returns (stream VehicleLocation);

  // Cross-service filtering: returns shipment IDs matching the filter
  rpc ResolveShipmentIDs(ShipmentFilterRequest) returns (filters.IDsResponse);

  // Cross-service filtering: returns trip IDs matching the filter
  rpc ResolveTripIDs(TripFilterRequest) returns (filters.IDsResponse);

  // Get chat members for a shipment (dispatchers + drivers from current trip)
  rpc GetShipmentChatMembers(GetShipmentChatMembersRequest) returns (GetShipmentChatMembersResponse);

  // Chat entity suggestions: active/upcoming loads for a driver
  rpc GetDriverActiveLoads(GetDriverActiveLoadsRequest) returns (GetDriverActiveLoadsResponse);

  // Chat entity suggestions: loads with unsettled payments (last N days)
  rpc GetDriverUnsettledLoads(GetDriverUnsettledLoadsRequest) returns (GetDriverUnsettledLoadsResponse);

  // Chat entity suggestions: loads with missing/rejected documents
  rpc GetDriverDocIssueLoads(GetDriverDocIssueLoadsRequest) returns (GetDriverDocIssueLoadsResponse);

  // Trip chat info: drivers + dispatchers + shipment metadata for chat creation.
  rpc GetTripChatInfo(GetTripChatInfoRequest) returns (GetTripChatInfoResponse);

  // ── Pay Batch (used by backend-accounting) ─────────────────────────
  // Returns picker-UI payload for the pay-batch creation screen: two baskets
  // of trips — those that match the period window (status=DELIVERED) and
  // IN_TRANSIT trips whose reference leg falls OUTSIDE the window.
  // Caller (accounting) pre-computes the list of trip IDs that are already
  // busy (in another active batch or already in some non-superseded
  // statement) and passes them via `excluded_trip_ids` so backend-load
  // filters them out at the SQL level.
  rpc GetTripsForPayBatch(GetTripsForPayBatchRequest) returns (GetTripsForPayBatchResponse);

  // Returns detailed pay-batch payload for a given set of trip IDs.
  // Used by backend-accounting when building a pay batch from a pre-selected
  // list of trips (createPayBatch) OR for enriching "already-in-batch"
  // picker-UI rows with full trip details.
  rpc GetTripsByIDs(GetTripsByIDsRequest) returns (GetTripsByIDsResponse);

  // Returns trips eligible for MANUAL addition to a Driver Pay Statement:
  //   - trips.main_driver_id == driver_id
  //   - shipment.status IN (DELIVERED, COMPLETED, READY_FOR_BILLING, INVOICED, PAID, TONU)
  // No period filter (unlike GetTripsForPayBatch). Caller (accounting) performs
  // busy-statement / busy-batch exclusion in-memory after the response, so the
  // request stays minimal.
  rpc GetUnbilledDriverTrips(GetUnbilledDriverTripsRequest)
      returns (GetUnbilledDriverTripsResponse);

  // ── Invoice Batch (used by backend-accounting) ─────────────────────────
  // Returns shipments eligible for invoicing (status = READY_FOR_BILLING)
  // with the full billing payload (customer, stops, money, factoring info).
  // Filters: optional date range against pickup OR delivery (via time_type),
  // optional customer / MC filter. excluded_shipment_ids removes shipments
  // already inside an active invoice batch (computed by accounting before
  // the call).
  rpc GetShipmentsReadyForBilling(GetShipmentsReadyForBillingRequest)
      returns (GetShipmentsReadyForBillingResponse);

  // Returns the billing payload for a pre-selected set of shipments.
  // Used by backend-accounting when actually building the invoice batch
  // (createInvoiceBatch) — after the operator has confirmed which shipments
  // to invoice.
  rpc GetShipmentsByIDs(GetShipmentsByIDsRequest)
      returns (GetShipmentsByIDsResponse);

  // Returns every order_file attached to a shipment — files on the shipment
  // itself, on its trips, and on the trip stops — in one flat list. Each
  // row carries document_type (POD / RATE_CON / BOL / INVOICE / OTHER) so
  // the caller (backend-accounting) can pick the kinds it needs (e.g. merge
  // POD + RC into the invoice PDF, or attach them to a factoring batch).
  rpc GetShipmentFiles(GetShipmentFilesRequest)
      returns (GetShipmentFilesResponse);

  // Returns the trip IDs belonging to a single shipment (1 shipment → N trips
  // через split-сценарии). Used by backend-accounting Financial Summary
  // (Shipment.accountsPayable) to aggregate driver pay по trip-set.
  // Reuses filters.IDsResponse — payload is just a list of UUID strings.
  rpc GetTripIDsByShipment(GetTripIDsByShipmentRequest)
      returns (filters.IDsResponse);
}

message DriverHasActiveTripRequest {
  string driver_crew_id  = 1;
}

message DriverHasActiveTripResponse {
  bool        has_active_trip = 1;
  TripDetails active_trip      = 2; // nil/unset если has_active_trip = false
}

// ── Absence/trip overlap advisory (DEV-896) ────────────────────────────

message GetTripsOverlappingWindowRequest {
  string driver_id  = 1; // matches trips.main_driver_id OR trips.secondary_driver_id
  string start_date = 2; // YYYY-MM-DD, inclusive
  string end_date   = 3; // YYYY-MM-DD, inclusive
}

// Slim trip summary for absence-overlap warnings. Dates are the trip's
// calendar window (pickup day .. delivery day); status is the backend-load
// trip status string (ASSIGNED..LEAVING_STOP).
message TripOverlapSummary {
  string trip_id        = 1;
  string shipment_id    = 2;
  string load_number    = 3; // shipment.load_id, "" if unset
  string trip_number    = 4; // display number, "" if unset
  string status         = 5;
  string pickup_date    = 6; // YYYY-MM-DD — trip window start
  string delivery_date  = 7; // YYYY-MM-DD — trip window end
  string driver_crew_id = 8; // "" if the trip somehow has no crew
}

message GetTripsOverlappingWindowResponse {
  repeated TripOverlapSummary trips = 1;
}

message ShipmentFilterRequest {
  filters.StringFilter load_id = 1;
  filters.StringFilter status = 2;
  filters.IntFilter shipment_number = 3;
  filters.IDFilter broker_id = 4;
  filters.DateTimeFilter created_at = 5;
  optional string search = 6;
}

message TripFilterRequest {
  filters.StringFilter status = 1;
  filters.IDFilter truck_id = 2;
  filters.IDFilter trailer_id = 3;
  filters.IDFilter driver_id = 4;
  filters.DateTimeFilter created_at = 5;
  optional string search = 6;
}

message GetDriverTripDetailsRequest {
  repeated string driver_crew_ids = 1;
  string start_date = 2; // Начало недели
  string end_date = 3;   // Конец недели
}

message GetDriverTripDetailsResponse {
  repeated TripDetails trip_details = 1;
}

message TripDetails {
  string shipment_id = 1;
  string trip_id = 2;
  string driver_crew_id = 3;
  string load_number = 4;
  double total_pay = 5;
  double distance = 6;
  string started_at = 7;   // ISO Timestamp
  string finished_at = 8;  // ISO Timestamp (nullable/empty if active)
  string status = 9;                  // trip status; needed so the audit upsert's status_rank guard admits a resync
  string pickup_appointment_at = 10;  // ISO Timestamp of the pickup leg appointment; the audit board's bucketing key (empty if none)
}

message GetRecentBrokerIDsRequest {
  string courier_id = 1; // Filter by courier
  int32 limit = 20;
}

message GetRecentBrokerIDsResponse {
  repeated string broker_ids = 1;
}

// Request to get a shipment by ID
message GetShipmentRequest {
  string shipment_id = 1;
}

// Shipment response
message ShipmentResponse {
  Shipment shipment = 1;
}

// Request to list shipments
message ListShipmentsRequest {
  int32 limit = 1;
  int32 offset = 2;
  ShipmentStatus status = 3;
  google.protobuf.Timestamp from_date = 4;
  google.protobuf.Timestamp to_date = 5;
}

// List shipments response
message ListShipmentsResponse {
  repeated Shipment shipments = 1;
  int32 total = 2;
}

// Request to get a trip by ID
message GetTripRequest {
  string trip_id = 1;
}

// Trip response
message TripResponse {
  Trip trip = 1;
}

// Request to list trips
message ListTripsRequest {
  int32 limit = 1;
  int32 offset = 2;
  TripStatus status = 3;
  string truck_id = 4;
  string trailer_id = 5;
  string driver_id = 6;
  google.protobuf.Timestamp from_date = 7;
  google.protobuf.Timestamp to_date = 8;
}

// List trips response
message ListTripsResponse {
  repeated Trip trips = 1;
  int32 total = 2;
}

// Request to get vehicle assignments
message GetVehicleAssignmentsRequest {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
  repeated string truck_ids = 3;
  repeated string trailer_ids = 4;
}

// Vehicle assignments response
message GetVehicleAssignmentsResponse {
  repeated VehicleAssignment assignments = 1;
}

// Request to update vehicle location
message UpdateVehicleLocationRequest {
  string vehicle_id = 1;
  VehicleType vehicle_type = 2;
  double latitude = 3;
  double longitude = 4;
  double heading = 5;
  double speed = 6;
  google.protobuf.Timestamp gps_time = 7;
}

// Request to stream vehicle locations
message StreamVehicleLocationsRequest {
  repeated string vehicle_ids = 1;
  bool active_only = 2;
}

// Shipment model
message Shipment {
  string id = 1;
  string load_number = 2;
  string broker_id = 3;
  string broker_load_number = 4;
  ShipmentStatus status = 5;
  ShipmentType type = 6;
  double total_weight = 7;
  double total_distance = 8;
  double total_pay = 9;
  repeated ShipmentLeg legs = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// Shipment leg (pickup/delivery)
message ShipmentLeg {
  string id = 1;
  string shipment_id = 2;
  StopType stop_type = 3;
  string location = 4;
  double latitude = 5;
  double longitude = 6;
  string appointment_type = 7;
  google.protobuf.Timestamp appointment_from = 8;
  google.protobuf.Timestamp appointment_to = 9;
  google.protobuf.Timestamp actual_arrival = 10;
  google.protobuf.Timestamp actual_departure = 11;
}

// Trip model
message Trip {
  string id = 1;
  string shipment_id = 2;
  string truck_id = 3;
  string trailer_id = 4;
  string driver_id = 5;
  TripStatus status = 6;
  double initial_latitude = 7;
  double initial_longitude = 8;
  double current_latitude = 9;
  double current_longitude = 10;
  double total_miles = 11;
  double empty_miles = 12;
  repeated TripStop stops = 13;
  google.protobuf.Timestamp start_time = 14;
  google.protobuf.Timestamp end_time = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

// Trip stop
message TripStop {
  string id = 1;
  string trip_id = 2;
  string leg_id = 3;
  string location = 4;
  StopType stop_type = 5;
  int32 stop_sequence = 6;
  double latitude = 7;
  double longitude = 8;
  google.protobuf.Timestamp planned_arrival = 9;
  google.protobuf.Timestamp actual_arrival = 10;
  google.protobuf.Timestamp planned_departure = 11;
  google.protobuf.Timestamp actual_departure = 12;
  StopStatus status = 13;
}

// Vehicle assignment
message VehicleAssignment {
  string assignment_id = 1;
  string vehicle_id = 2;
  VehicleType vehicle_type = 3;
  string trip_id = 4;
  string driver_id = 5;
  google.protobuf.Timestamp assigned_from = 6;
  google.protobuf.Timestamp assigned_to = 7;
}

// Vehicle location
message VehicleLocation {
  string vehicle_id = 1;
  VehicleType vehicle_type = 2;
  double latitude = 3;
  double longitude = 4;
  double heading = 5;
  double speed = 6;
  google.protobuf.Timestamp gps_time = 7;
  string trip_id = 8;
  string driver_id = 9;
}

// Shipment status enum — mirror of backend-load domain.ShipmentStatus.
// String form is preferred in payloads (see PayBatchTrip.shipment_status,
// ShipmentBillingItem.status); keep this enum only for ListShipmentsRequest
// filtering.
enum ShipmentStatus {
  SHIPMENT_STATUS_UNSPECIFIED = 0;
  SHIPMENT_STATUS_PENDING = 1;
  SHIPMENT_STATUS_CONFIRMED = 2;
  SHIPMENT_STATUS_DISPATCHED = 3;
  SHIPMENT_STATUS_IN_TRANSIT = 4;
  SHIPMENT_STATUS_DELIVERED = 5;
  SHIPMENT_STATUS_CANCELLED = 6;
  SHIPMENT_STATUS_COMPLETED = 7;
  SHIPMENT_STATUS_READY_FOR_BILLING = 8;
  SHIPMENT_STATUS_INVOICED = 9;
  SHIPMENT_STATUS_PAID = 10;
  SHIPMENT_STATUS_TONU = 11;
}

// Shipment type enum
enum ShipmentType {
  SHIPMENT_TYPE_UNSPECIFIED = 0;
  SHIPMENT_TYPE_FTL = 1;  // Full Truck Load
  SHIPMENT_TYPE_LTL = 2;  // Less Than Load
  SHIPMENT_TYPE_PARTIAL = 3;
}

// Trip status enum
enum TripStatus {
  TRIP_STATUS_UNSPECIFIED = 0;
  TRIP_STATUS_PLANNED = 1;
  TRIP_STATUS_ASSIGNED = 2;
  TRIP_STATUS_IN_PROGRESS = 3;
  TRIP_STATUS_COMPLETED = 4;
  TRIP_STATUS_CANCELLED = 5;
}

// Stop type enum
enum StopType {
  STOP_TYPE_UNSPECIFIED = 0;
  STOP_TYPE_PICKUP = 1;
  STOP_TYPE_DELIVERY = 2;
  STOP_TYPE_REST = 3;
  STOP_TYPE_FUEL = 4;
}

// Stop status enum
enum StopStatus {
  STOP_STATUS_UNSPECIFIED = 0;
  STOP_STATUS_PENDING = 1;
  STOP_STATUS_ARRIVED = 2;
  STOP_STATUS_IN_PROGRESS = 3;
  STOP_STATUS_COMPLETED = 4;
  STOP_STATUS_SKIPPED = 5;
}

// Vehicle type enum (shared with trackers.proto)
enum VehicleType {
  VEHICLE_TYPE_UNSPECIFIED = 0;
  VEHICLE_TYPE_TRUCK = 1;
  VEHICLE_TYPE_TRAILER = 2;
}

message GetShipmentChatMembersRequest {
  string shipment_id = 1;
}

message GetShipmentChatMembersResponse {
  repeated string member_ids = 1;
}

// ── Chat Entity Suggestions ──────────────────────────────

message LoadSuggestion {
  string id = 1;              // shipment UUID
  string load_id = 2;         // display: "Load #4821"
  string status = 3;          // current shipment status
  string pickup_location = 4; // "Dallas, TX"
  string delivery_location = 5; // "Chicago, IL"
  string meta = 6;            // extra info: "Settlement pending $1,420"
}

message GetDriverActiveLoadsRequest {
  string driver_id = 1;
}

message GetDriverActiveLoadsResponse {
  repeated LoadSuggestion loads = 1;
}

message GetDriverUnsettledLoadsRequest {
  string driver_id = 1;
  int32 days_back = 2; // default 90
}

message GetDriverUnsettledLoadsResponse {
  repeated LoadSuggestion loads = 1;
}

message GetDriverDocIssueLoadsRequest {
  string driver_id = 1;
}

message GetDriverDocIssueLoadsResponse {
  repeated LoadSuggestion loads = 1;
}

// ── Trip Chat Info (used by backend-messaging) ─────────────────────────
message GetTripChatInfoRequest {
  string trip_id = 1;
}

message GetTripChatInfoResponse {
  string shipment_id = 1;
  string shipment_number = 2;
  string main_driver_id = 3;
  optional string secondary_driver_id = 4;
  repeated string dispatcher_ids = 5;
  bool is_current_trip = 6;
}

// ── Pay Batch (backend-accounting) ─────────────────────────────────────

// Which shipment leg is used to test the [period_start, period_end] window:
//   PICKUP   = first leg (MIN leg_sequence)   — pickup time
//   DELIVERY = last leg  (MAX leg_sequence)   — delivery time
// Reference time itself is COALESCE(trip_stop.checked_in_at, shipment_leg.appointment_from).
enum PayBatchTimeType {
  PAY_BATCH_TIME_TYPE_UNSPECIFIED = 0;
  PAY_BATCH_TIME_TYPE_PICKUP      = 1;
  PAY_BATCH_TIME_TYPE_DELIVERY    = 2;
}

message GetTripsForPayBatchRequest {
  google.protobuf.Timestamp period_start = 1;
  google.protobuf.Timestamp period_end   = 2;
  PayBatchTimeType          time_type    = 3;

  // Trips that must NOT appear in response — already in an active pay batch
  // (draft/posted) or already attached to a non-superseded statement.
  // Computed by accounting before the call; empty = nothing to exclude.
  repeated string excluded_trip_ids = 4;

  // If true, response.in_transit_outside_range is populated; if false — empty.
  // Saves one sub-SELECT when the picker UI doesn't need that column.
  bool include_in_transit_outside_range = 5;

  // Explicit tenant scope — accounting passes the caller's company_id
  // (extracted from the caller's JWT) so backend-load can filter without a
  // gRPC AuthServerInterceptor. When AuthServerInterceptor is wired up on
  // backend-load, this field can be ignored in favour of the actor in ctx.
  string company_id = 6;
}

message GetTripsForPayBatchResponse {
  // Trips matching status=DELIVERED AND reference leg in [period_start, period_end],
  // minus `excluded_trip_ids`.
  repeated PayBatchTrip available = 1;

  // Trips with status=IN_TRANSIT whose reference leg is OUTSIDE the window.
  // Empty when include_in_transit_outside_range=false.
  repeated PayBatchTrip in_transit_outside_range = 2;
}

message GetTripsByIDsRequest {
  repeated string trip_ids = 1;
  // Same semantics as GetTripsForPayBatchRequest.company_id.
  string company_id = 2;
}

message GetTripsByIDsResponse {
  repeated PayBatchTrip trips = 1;
}

message GetUnbilledDriverTripsRequest {
  // Tenant scope — accounting passes the caller's company_id from JWT.
  string company_id = 1;
  // Trip's main driver — only trips of this driver are returned.
  string driver_id  = 2;
}

message GetUnbilledDriverTripsResponse {
  // Trips of `driver_id` where shipment.status IN
  // (DELIVERED, COMPLETED, READY_FOR_BILLING, INVOICED, PAID, TONU).
  // No period filter applied.
  repeated PayBatchTrip trips = 1;
}

// ── Invoice Batch messages (backend-accounting) ────────────────────────

message GetShipmentsReadyForBillingRequest {
  // Tenant scope — accounting passes the caller's company_id (from JWT)
  // because backend-load's gRPC server runs without AuthServerInterceptor.
  string company_id = 1;

  // Optional date window. When both ends are set, time_type (PICKUP /
  // DELIVERY) selects which shipment leg's date is tested against the
  // window. PAY_BATCH_TIME_TYPE_UNSPECIFIED disables the date filter.
  optional google.protobuf.Timestamp date_from = 2;
  optional google.protobuf.Timestamp date_to   = 3;
  PayBatchTimeType time_type                   = 4;

  // Optional dimensional filters.
  optional string mc_number   = 5;
  optional string customer_id = 6;

  // Shipments that must NOT appear in the response — already inside an
  // active invoice batch. Computed by accounting before the call.
  repeated string excluded_shipment_ids = 7;
}

message GetShipmentsReadyForBillingResponse {
  repeated ShipmentBillingItem shipments = 1;
}

message GetShipmentsByIDsRequest {
  // Tenant scope — same semantics as
  // GetShipmentsReadyForBillingRequest.company_id.
  string company_id = 1;
  repeated string shipment_ids = 2;
}

message GetShipmentsByIDsResponse {
  repeated ShipmentBillingItem shipments = 1;
}

// ShipmentBillingItem carries everything backend-accounting needs to:
//   1. render the picker row (customer, dates, money),
//   2. denormalise into Invoice (Bill To, Remit To, stops),
//   3. enforce the "status=READY_FOR_BILLING" precondition on Create.
//
// Free-form string fields default to "" when backend-load doesn't know the
// value (e.g. driver_name lives in backend-teams). Accounting tolerates
// empty strings and falls back to its own data sources.
message ShipmentBillingItem {
  string shipment_id        = 1;
  optional string load_id   = 2;          // shipment.load_id (display)
  string load_number        = 3;          // mirror of load_id for clarity
  int64  shipment_number    = 4;          // shipment.shipment_number
  string status             = 5;          // shipment.status (free-form)

  // Bill To.
  string customer_id        = 6;
  string customer_name      = 7;          // "" when unknown
  string customer_address   = 8;          // billing address; "" when unknown
  string customer_mc_number = 9;          // "" when unknown

  // Driver (informational; full name lives in backend-teams).
  optional string driver_id = 10;
  string driver_name        = 11;         // "" — accounting hits teams itself

  // Stops (first leg = pickup, last leg = delivery).
  string pickup_address     = 12;
  google.protobuf.Timestamp pickup_date     = 13;
  string delivery_address   = 14;
  google.protobuf.Timestamp delivery_date   = 15;
  // Facility names (first/last leg); "" when unset. Field numbers appended
  // (21/22) for wire-compat; logically part of the stops block above.
  string pickup_facility_name   = 21;
  string delivery_facility_name = 22;

  // Money.
  double total_amount       = 16;         // shipment.total_pay

  // Routing / factoring (placeholders for now — backend-load doesn't yet
  // own customer billing settings; accounting renders empty values when
  // these are "").
  string billing_type           = 17;
  string mc_number              = 18;
  string factoring_company_name = 19;
  string factoring_remit_to     = 20;
}

// ── Shipment Files (backend-accounting) ─────────────────────────────
// Used to fetch all documents (POD / RATE_CON / BOL / INVOICE / OTHER) tied
// to a shipment — the same flat list that backend-load aggregates over
// shipment-level + trip-level + trip-stop-level order_files. Accounting
// filters by document_type to merge attachments into invoice / factoring
// PDFs.

message GetShipmentFilesRequest {
  string shipment_id = 1;
}

message ShipmentFile {
  string file_id       = 1;  // UUID in backend-files
  string document_type = 2;  // "POD" | "RATE_CON" | "BOL" | "INVOICE" | "OTHER"
  string entity_type   = 3;  // "SHIPMENT" | "TRIP" | "TRIP_STOP"
  string entity_id     = 4;  // UUID of the parent entity (for diagnostics)
}

message GetShipmentFilesResponse {
  repeated ShipmentFile files = 1;
}

// Request for GetTripIDsByShipment. company_id is passed explicitly because
// backend-load currently runs without an AuthServerInterceptor; backend-load
// validates that shipment_id belongs to the tenant before returning trip IDs.
message GetTripIDsByShipmentRequest {
  string company_id  = 1;
  string shipment_id = 2;
}

// Детали trip-а, нужные backend-accounting чтобы создать pay_batch
// из пре-выбранного списка trip-ов (createPayBatch(tripIds)).
message PayBatchTrip {
  string trip_id     = 1;
  string trip_number = 2;

  optional string load_id   = 3;  // shipment.load_id (display number)
  string load_number        = 4;
  optional string driver_id = 5;  // main driver ID, если есть
  string driver_name        = 6;  // опционально; "" если backend-load не знает (лежит в teams)
  string shipment_status    = 7;  // IN_TRANSIT / DELIVERED / COMPLETED / READY_FOR_BILLING

  google.protobuf.Timestamp pickup_date   = 8;  // COALESCE(first_stop.checked_in_at, first_leg.appointment_from)
  google.protobuf.Timestamp delivery_date = 9;  // COALESCE(last_stop.checked_in_at,  last_leg.appointment_from)

  string pickup_city    = 10;
  string pickup_state   = 11;
  string delivery_city  = 12;
  string delivery_state = 13;

  double loaded_miles = 14;
  double empty_miles  = 15;
  double total_miles  = 16;

  double total_pay    = 17;  // shipment.total_pay
  double driver_gross = 18;  // расчётная зарплата водителя (если известна)
  double rate         = 19;  // shipment.rpm
  string truck_unit   = 20;  // truck.license / number, "" если нет

  optional string shipment_id = 21;  // trip.shipment_id (UUID), для backend-accounting trip→shipment маппинга
  optional string secondary_driver_id = 22;  // trip.secondary_driver_id (team driver), если есть
  optional string truck_id = 23;  // trip.truck_id (UUID), для backend-accounting truck-фильтра стейтментов
}

