// pkg/proto/teams/teams.proto
syntax = "proto3";

package teams;

import "google/protobuf/timestamp.proto";
import "filters/filters.proto";

option go_package = "github.com/TMS360/backend-pkg/proto/teams";

service TeamsService {
  // Get DriverCrew details by targetDate
  rpc GetDriverCrew(GetDriverCrewRequest) returns (GetDriverCrewResponse);

  rpc GetDriverCrewWithDispatchers(GetDriverCrewRequest) returns (GetDriverCrewWithDispatchersResponse);

  // Returns IDs of vehicles assigned during the requested window
  rpc GetBusyVehicles(GetBusyVehiclesRequest) returns (GetBusyVehiclesResponse);

  // Get current drivers for a list of trucks
  rpc GetCurrentDriversByTruckIds (GetCurrentDriversByTruckIdsRequest) returns (GetCurrentDriversByTruckIdsResponse);
  rpc GetCurrentDriversByTrailerIds (GetCurrentDriversByTrailerIdsRequest) returns (GetCurrentDriversByTrailerIdsResponse);

  // Cross-service filtering: returns driver crew IDs matching the filter
  rpc ResolveDriverCrewIDs(DriverCrewFilter) returns (filters.IDsResponse);

  // Cross-service filtering: returns truck IDs matching the filter
  rpc ResolveTruckIDs(TruckFilter) returns (filters.IDsResponse);

  // Cross-service filtering: returns trailer IDs matching the filter
  rpc ResolveTrailerIDs(TrailerFilter) returns (filters.IDsResponse);

  // Cross-service filtering: returns driver IDs matching the filter
  rpc ResolveDriverIDs(DriverFilter) returns (filters.IDsResponse);
}

message DriverCrewFilter {
  filters.IDFilter primary_driver_id = 1;
  filters.IDFilter truck_id = 2;
  filters.IDFilter trailer_id = 3;
  optional string search = 4;
}

message TruckFilter {
  filters.StringFilter number = 1;
  filters.StringFilter vin = 2;
  filters.StringFilter make = 3;
  filters.StringFilter model = 4;
  filters.StringFilter status = 5;
  filters.IntFilter year = 6;
  optional string search = 7;
}

message TrailerFilter {
  filters.StringFilter number = 1;
  filters.StringFilter vin = 2;
  filters.StringFilter make = 3;
  filters.StringFilter model = 4;
  filters.StringFilter status = 5;
  filters.StringFilter trailer_type = 6;
  optional string search = 7;
}

message DriverFilter {
  filters.StringFilter first_name = 1;
  filters.StringFilter last_name = 2;
  filters.StringFilter email = 3;
  filters.StringFilter phone = 4;
  filters.StringFilter status = 5;
  filters.StringFilter license_number = 6;
  optional string search = 7;
}

message GetDriverCrewRequest {
  string driver_crew_id = 1;
  string target_date = 2; // Format: YYYY-MM-DD
}

message GetDriverCrewResponse {
  DriverCrewInfo data = 1;
}

message GetDriverCrewWithDispatchersResponse {
  DriverCrewInfo data = 1;
  repeated string dispatcher_ids = 2;
}

message GetBusyVehiclesRequest {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
}

message GetBusyVehiclesResponse {
  repeated string truck_ids = 1;
  repeated string trailer_ids = 2;
}

message GetCurrentDriversByTruckIdsRequest {
  string target_date = 1; // Format: YYYY-MM-DD
  repeated string truck_ids = 2;
}

message GetCurrentDriversByTruckIdsResponse {
  repeated DriverCrewInfo data = 1;
}

message GetCurrentDriversByTrailerIdsRequest {
  string target_date = 1; // Format: YYYY-MM-DD
  repeated string trailer_ids = 2;
}

message GetCurrentDriversByTrailerIdsResponse {
  repeated DriverCrewInfo data = 1;
}

message DriverCrewInfo {
  string driver_crew_id = 1;
  string primary_driver_id = 2;
  string secondary_driver_id = 3;
  string truck_id = 4;
  string trailer_id = 5;
  string plan_id = 6;
}

message TrailerInfo {
  string truck_id = 1;
}